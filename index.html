<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Melt Value Calculator</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f59e0b'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #171717;
    border: 1px solid #2a2a2a;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 13px;
    color: #a3a3a3;
    margin: 0 0 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #d4d4d4;
    margin-bottom: 6px;
  }
  .field { margin-bottom: 16px; }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #262626;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    color: #f5f5f5;
    outline: none;
  }
  input::placeholder { color: #737373; }
  input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.25); }

  .box {
    background: rgba(38,38,38,0.6);
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .box .label { font-size: 13px; color: #a3a3a3; margin: 0; }
  .box .value { font-size: 18px; font-weight: 700; color: #fbbf24; }
  .box.offer .value { font-size: 24px; color: #34d399; }

  .pct-label {
    font-size: 13px;
    font-weight: 500;
    color: #d4d4d4;
    margin-bottom: 8px;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .pct-btn {
    background: #262626;
    border: 1px solid #3a3a3a;
    color: #e5e5e5;
    padding: 12px 0;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .pct-btn.active {
    background: #f59e0b;
    border-color: #f7b733;
    color: #171717;
  }
  .pct-btn:disabled { opacity: 0.4; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Melt Value Calculator</h1>
    <p class="sub">Convert spot price per troy oz into a purchase offer.</p>

    <div class="field">
      <label for="price">Price per troy oz ($)</label>
      <input type="number" id="price" inputmode="decimal" step="0.01" min="0" placeholder="e.g. 2350.00">
    </div>

    <div class="field">
      <label for="grams">Mass (grams, up to 1 decimal)</label>
      <input type="text" id="grams" inputmode="decimal" placeholder="e.g. 15.3">
    </div>

    <div class="box">
      <p class="label">Full melt value</p>
      <p class="value" id="meltValue">—</p>
    </div>

    <p class="pct-label">Offer price</p>
    <div class="btn-row">
      <button class="pct-btn" data-pct="55">55%</button>
      <button class="pct-btn" data-pct="60">60%</button>
      <button class="pct-btn" data-pct="90">90%</button>
    </div>

    <div class="box offer">
      <p class="label" id="offerLabel">Select a percentage</p>
      <p class="value" id="offerValue">—</p>
    </div>
  </div>
</div>

<script>
  const GRAMS_PER_TROY_OZ = 31.1;
  let selectedPct = null;

  const priceEl = document.getElementById('price');
  const gramsEl = document.getElementById('grams');
  const meltValueEl = document.getElementById('meltValue');
  const offerValueEl = document.getElementById('offerValue');
  const offerLabelEl = document.getElementById('offerLabel');
  const pctBtns = document.querySelectorAll('.pct-btn');

  function fmt(n) {
    if (n === null || isNaN(n)) return '—';
    return n.toLocaleString(undefined, { style: 'currency', currency: 'USD' });
  }

  function getMeltValue() {
    const price = parseFloat(priceEl.value);
    const mass = parseFloat(gramsEl.value);
    if (isNaN(price) || isNaN(mass)) return null;
    return (price / GRAMS_PER_TROY_OZ) * mass;
  }

  function update() {
    const melt = getMeltValue();
    meltValueEl.textContent = fmt(melt);

    pctBtns.forEach(btn => {
      btn.disabled = melt === null;
    });

    if (melt !== null && selectedPct !== null) {
      offerValueEl.textContent = fmt(melt * (selectedPct / 100));
      offerLabelEl.textContent = `Offer at ${selectedPct}%`;
    } else {
      offerValueEl.textContent = '—';
      offerLabelEl.textContent = 'Select a percentage';
    }
  }

  gramsEl.addEventListener('input', (e) => {
    let val = e.target.value;
    if (val !== '' && !/^\d*\.?\d{0,1}$/.test(val)) {
      e.target.value = val.slice(0, -1);
    }
    update();
  });

  priceEl.addEventListener('input', update);

  pctBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      selectedPct = parseInt(btn.dataset.pct, 10);
      pctBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      update();
    });
  });

  update();
</script>
</body>
</html>
